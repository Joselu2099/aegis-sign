server:
  port: 8080

spring:
  application:
    name: aegis-sign
  
  # Persistence: R2DBC (Reactive)
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/aegis_db
    username: aegis_user
    password: aegis_password
    pool:
      max-size: 10
      initial-size: 2

  # Flyway: Migrations (JDBC)
  flyway:
    url: jdbc:postgresql://localhost:5432/aegis_db
    user: aegis_user
    password: aegis_password
    enabled: true

  # Redis: Reactive Cache and Sessions
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 3600s
      cache-null-values: false

rate-limit:
  kyc:
    capacity: 10
    refill-rate: 1 # tokens per second

# Object Storage: MinIO (S3 API)
minio:
  endpoint: http://localhost:9000
  access-key: aegis_admin
  secret-key: aegis_admin_password
  bucket: aegis-sign
  temp-bucket: aegis-sign-temp # New temporary bucket for biometric data
  encryption:
    enabled: true
    type: SSE-S3 # Server-Side Encryption with S3-Managed Keys
    # kms-key-id: "" # Optional for SSE-KMS

storage:
  purge:
    retention-days: 7 # Retention period for temporary files in days
    cron: 0 0 2 * * * # Daily at 2 AM

tesseract:
  datapath: /usr/share/tesseract-ocr/5/tessdata

