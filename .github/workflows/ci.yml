name: CI (Validation)

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  verify:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install native dependencies (Tesseract OCR)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr \
            libtesseract-dev \
            libleptonica-dev

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Run Tests
        run: mvn clean test --batch-mode
        env:
          VAULT_TOKEN: dummy-ci-token

      - name: Upload Surefire Reports on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

      - name: Generate Coverage Summary
        if: always()
        run: |
          if [ -f target/site/jacoco/jacoco.csv ]; then
            echo "### JaCoCo Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
            awk -F, 'NR > 1 { missed += $4; covered += $5 } END { total = missed + covered; if (total > 0) print "Instructions Coverage: " sprintf("%.2f%%", (covered / total) * 100); else print "No coverage data" }' target/site/jacoco/jacoco.csv >> $GITHUB_STEP_SUMMARY
          else
            echo "### JaCoCo Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo "Coverage report target/site/jacoco/jacoco.csv not found." >> $GITHUB_STEP_SUMMARY
          fi
