name: CI (Validation)

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: 'maven'

      - name: Build and Run Tests
        run: mvn clean test

      - name: Generate Coverage Summary
        if: always()
        run: |
          if [ -f target/site/jacoco/jacoco.csv ]; then
            echo "### JaCoCo Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
            # Sum up covered and missed instructions
            awk -F, 'NR > 1 { missed += $4; covered += $5 } END { total = missed + covered; if (total > 0) print "Instructions Coverage: " sprintf("%.2f%%", (covered / total) * 100); else print "No coverage data" }' target/site/jacoco/jacoco.csv >> $GITHUB_STEP_SUMMARY
          else
            echo "### JaCoCo Code Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo "Coverage report target/site/jacoco/jacoco.csv not found." >> $GITHUB_STEP_SUMMARY
          fi
